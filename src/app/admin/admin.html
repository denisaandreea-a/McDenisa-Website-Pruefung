<div class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4>Produktverwaltung</h4>
  <a routerLink="/admin/product/new" class="btn btn-success">+ Neues Produkt</a>
</div>

<table class="table table-bordered table-hover">
  <thead class="table-dark">
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Preis</th>
      <th>Kategorie</th>
      <th>Aktionen</th>
    </tr>
  </thead>
  <tbody>
    @for (product of products; track product.id) {
      <tr>
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.price | currency:'EUR' }}</td>
        <td>{{ product.category }}</td>
        <td>
          <a [routerLink]="['/admin/product', product.id]"
             class="btn btn-sm btn-outline-primary me-2">Bearbeiten</a>
          <button type="button" class="btn btn-sm btn-danger"
                  (click)="deleteProduct(product)">Löschen</button>
        </td>
      </tr>
    }
  </tbody>
</table>
</div>
